<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS CLF 시험 모드</title>
  <style>
    :root { --bg:#f5f7fb; --card:#ffffff; --line:#dbe2ea; --text:#17212b; --muted:#5b6b7c; --primary:#0078d4; --primary-dark:#005ea6; --green:#137333; --red:#c5221f; --amber:#8a5a00; --tag:#eef6ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: Arial, 'Malgun Gothic', sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1100px; margin:0 auto; padding:24px; }
    .hero { background:linear-gradient(135deg, #0f172a, #113b70); color:#fff; border-radius:18px; padding:28px; box-shadow:0 10px 28px rgba(0,0,0,.15); }
    .hero h1 { margin:0 0 10px; font-size:32px; }
    .hero p { margin:0; color:#dbeafe; }
    .toolbar { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin:18px 0 20px; }
    .panel { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; box-shadow:0 4px 12px rgba(0,0,0,.05); }
    .panel label { display:block; font-weight:700; margin-bottom:8px; }
    select, input[type="number"] { width:100%; padding:10px 12px; border:1px solid #c7d2de; border-radius:10px; font-size:14px; }
    .buttons { display:flex; gap:10px; flex-wrap:wrap; align-items:end; }
    button { border:none; background:var(--primary); color:#fff; padding:11px 16px; border-radius:10px; cursor:pointer; font-weight:700; }
    button:hover { background:var(--primary-dark); }
    button.secondary { background:#475569; }
    button.ghost { background:#e8eef5; color:#102a43; }
    .status { display:flex; gap:12px; flex-wrap:wrap; margin:12px 0 20px; }
    .badge { background:#fff; border:1px solid var(--line); border-radius:999px; padding:10px 14px; font-size:14px; }
    .exam-list { display:flex; flex-direction:column; gap:16px; }
    .question-card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; box-shadow:0 4px 12px rgba(0,0,0,.05); }
    .meta { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
    .qno { font-weight:800; color:#0f3d6e; }
    .tag { display:inline-block; background:var(--tag); color:#245ea8; border:1px solid #cfe4fc; border-radius:999px; padding:4px 10px; font-size:12px; font-weight:700; }
    .question-text { font-size:18px; font-weight:700; line-height:1.6; margin:8px 0 14px; }
    .options { display:grid; gap:10px; }
    .option { border:1px solid #d1dbe7; border-radius:12px; padding:12px 14px; display:flex; gap:12px; align-items:flex-start; transition:.15s; background:#fff; }
    .option:hover { border-color:#8ebae5; background:#f8fbff; }
    .option input { margin-top:4px; }
    .option.correct { border-color:#72c38f; background:#effaf3; }
    .option.wrong { border-color:#ef9a9a; background:#fff3f3; }
    .answer-area { margin-top:14px; display:none; border-top:1px dashed #d7e1ea; padding-top:14px; }
    .answer-area.show { display:block; }
    .answer-line { font-weight:800; color:var(--green); margin-bottom:10px; }
    .wrong-line { font-weight:800; color:var(--red); margin-bottom:10px; }
    .explain { white-space:pre-line; color:#203040; background:#f8fbff; border:1px solid #d5e7fb; border-left:4px solid #60a5fa; padding:12px 14px; border-radius:12px; }
    .result-box { display:none; margin-top:10px; }
    .result-box.show { display:block; }
    .summary { background:#fff; border:1px solid var(--line); border-radius:18px; padding:20px; box-shadow:0 4px 12px rgba(0,0,0,.05); margin-bottom:18px; }
    .score { font-size:28px; font-weight:900; margin:4px 0 8px; }
    .small { color:var(--muted); font-size:14px; }
    .progress { width:100%; height:12px; background:#e5edf5; border-radius:999px; overflow:hidden; margin-top:10px; }
    .progress > div { height:100%; background:linear-gradient(90deg,#22c55e,#16a34a); width:0%; }
    .footer-space { height:40px; }
    @media (max-width:700px) { .question-text { font-size:16px; } .hero h1 { font-size:26px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>AWS CLF 시험 모드</h1>
      <p>문제를 풀고 제출하면 자동으로 점수를 계산합니다. 제출 전에는 정답이 보이지 않고, 제출 후에 정답과 쉬운 해설이 함께 표시됩니다.</p>
    </section>

    <section class="toolbar">
      <div class="panel">
        <label for="questionCount">출제 문제 수</label>
        <select id="questionCount">
          <option value="10">10문제</option>
          <option value="20" selected>20문제</option>
          <option value="30">30문제</option>
          <option value="50">50문제</option>
          <option value="100">100문제</option>
        </select>
      </div>
      <div class="panel">
        <label for="tagFilter">카테고리 필터</label>
        <select id="tagFilter">
          <option value="ALL">전체</option>
        </select>
      </div>
      <div class="panel">
        <label>시험 제어</label>
        <div class="buttons">
          <button id="startBtn">시험 시작</button>
          <button class="ghost" id="shuffleBtn">문제 다시 섞기</button>
          <button class="secondary" id="submitBtn">제출하고 점수 계산</button>
        </div>
      </div>
    </section>

    <div class="status" id="statusBar">
      <div class="badge" id="poolInfo">문제 풀 수: 0</div>
      <div class="badge" id="renderInfo">현재 출제: 0</div>
      <div class="badge" id="answeredInfo">응답 수: 0</div>
    </div>

    <div id="summaryBox" class="summary" style="display:none;">
      <div class="small">시험 결과</div>
      <div id="scoreText" class="score">0 / 0</div>
      <div id="scoreDetail" class="small">정답률 0%</div>
      <div class="progress"><div id="scoreBar"></div></div>
    </div>
    <div id="pdfArea" style="margin-top:10px; display:none;">
      <button onclick="generatePDF()">📄 PDF 리포트 다운로드</button>
    </div>

    <div id="examList" class="exam-list"></div>
    <div class="footer-space"></div>
  </div>

ion": "이 문제는 [Database] 영역 문제입니다.\n\n문제의 핵심은 문장에서 요구하는 조건에 가장 잘 맞는 서비스를 고르는 것입니다.\n\n데이터베이스 문제는 관계형인지 NoSQL인지, 직접 운영할지 AWS가 운영해 줄지를 먼저 보는 것이 중요합니다.\n\n정답은 Amazon DynamoDB입니다. 문제에서 요구한 조건과 가장 직접적으로 맞기 때문입니다.\n\n초보자용 용어 설명\n• RDS: 설치와 운영을 덜어주는 관리형 관계형 데이터베이스 서비스입니다.\n• DynamoDB: 빠르고 자동 확장이 쉬운 NoSQL 데이터베이스입니다."}, {"id": "056", "tag": "[Security]", "question": "한 회사가 Amazon DynamoDB을 사용하고 있습니다. AWS shared responsibility model에 따르면 어떤 업무가 회사의 책임인가요?", "options": ["운영체제를 패치하세요.", "호스트를 제공하세요.", "데이터베이스 접근 권한을 관리하세요.", "운영체제를 안전하게 확보하세요."], "correctLetters": ["C"], "correctTexts": ["데이터베이스 접근 권한을 관리하세요."], "explanation": "이 문제는 [Security] 영역 문제입니다.\n\n문제의 핵심은 문장에서 요구하는 조건에 가장 잘 맞는 서비스를 고르는 것입니다.\n\n핵심은 AWS가 맡는 일과 고객이 직접 관리해야 하는 일을 구분하는 것입니다. 쉽게 말해, 건물 자체의 관리와 보안은 AWS가 맡고, 그 건물 안에서 누가 무엇을 하게 할지는 고객이 정합니다.\n\n정답은 데이터베이스 접근 권한을 관리하세요.입니다. 문제에서 요구한 조건과 가장 직접적으로 맞기 때문입니다.\n\n초보자용 용어 설명\n• DynamoDB: 빠르고 자동 확장이 쉬운 NoSQL 데이터베이스입니다."}, {"id": "057", "tag": "[Billing]", "question": "기업에는 테스트 AWS 환경이 있습니다. 한 회사가 AWS 내에 애플리케이션을 테스트할 계획입니다. 애플리케이션 테스트는 중단할 수 있으며 연속적으로 실행할 필요가 없습니다. 어떤 Amazon EC2 구매 옵션이 이러한 요구사항을 가장 비용 효율적으로 충족할까요?", "options": ["On-Demand Instances", "Dedicated Instances", "Spot Instances", "Reserved Instances"], "correctLetters": ["C"], "correctTexts": ["Spot Instances"], "explanation": "이 문제는 [Billing] 영역 문제입니다.\n\n문제의 핵심은 문장에서 요구하는 조건에 가장 잘 맞는 서비스를 고르는 것입니다.\n\n비용 문제는 사용 기간, 중단 허용 여부, 그리고 사용량을 예측할 수 있는지를 먼저 보면 정답이 잘 보입니다.\n\n정답은 Spot Instances입니다. 문제에서 요구한 조건과 가장 직접적으로 맞기 때문입니다.\n\n초보자용 용어 설명\n• EC2: AWS에서 제공하는 클라우드 속 가상 컴퓨터입니다. 필요할 때 켜서 서버처럼 사용할 수 있습니다."}, {"id": "058", "tag": "[Security]", "question": "어떤 AWS 서비스가 사용자가 Amazon S3 버킷에 저장된 민감한 데이터를 발견하고 보호할 수 있는 기능을 제공하나요?", "options": ["Amazon Macie", "Amazon Detective", "Amazon GuardDuty", "AWS IAM 접근 분석기"], "correctLetters": ["A"], "correctTexts": ["Amazon Macie"], "explanation": "이 문제는 [Security] 영역 문제입니다.\n\n문제의 핵심은 문장에서 요구하는 조건에 가장 잘 맞는 서비스를 고르는 것입니다.\n\n보안 문제는 접근 통제, 로그 기록, 위협 탐지, 규정 준수 중 무엇을 묻는지 먼저 구분하면 쉽습니다. ts": ["아마존 트랜스크립"], "explanation": "이 문제는 [General] 영역 문제입니다.\n\n문제의 핵심은 문장에서 요구하는 조건에 가장 잘 맞는 서비스를 고르는 것입니다.\n\n정답은 아마존 트랜스크립입니다. 문제에서 요구한 조건과 가장 직접적으로 맞기 때문입니다."}, {"id": "633", "tag": "[General]", "question": "어떤 AWS 서비스나 도구가 사용자가 AWS 서비스를 관리할 수 있는 그래픽 인터페이스를 제공하나요?", "options": ["AWS 부조종사", "AWS CLI", "AWS Management Console", "AWS 소프트웨어 개발 키트(SDK)"], "correctLetters": ["C"], "correctTexts": ["AWS Management Console"], "explanation": "이 문제는 [General] 영역 문제입니다.\n\n문제의 핵심은 문장에서 요구하는 조건에 가장 잘 맞는 서비스를 고르는 것입니다.\n\n정답은 AWS Management Console입니다. 문제에서 요구한 조건과 가장 직접적으로 맞기 때문입니다."}, {"id": "634", "tag": "[Billing]", "question": "회사는 1년 동안 연속적으로 운영되는 업무량을 가지고 있습니다. 업무량이 서비스 중단을 견디지 못합니다. 어떤 Amazon EC2 구매 옵션이 가장 비용 효율적일까요?", "options": ["모두 선불로 Reserved Instances", "부분 선불 Reserved Instances", "Dedicated Instances", "On-Demand Instances"], "correctLetters": ["A"], "correctTexts": ["모두 선불로 Reserved Instances"], "explanation": "이 문제는 [Billing] 영역 문제입니다.\n\n문제의 핵심은 문장에서 요구하는 조건에 가장 잘 맞는 서비스를 고르는 것입니다.\n\n비용 문제는 사용 기간, 중단 허용 여부, 그리고 사용량을 예측할 수 있는지를 먼저 보면 정답이 잘 보입니다.\n\n정답은 모두 선불로 Reserved Instances입니다. 문제에서 요구한 조건과 가장 직접적으로 맞기 때문입니다.\n\n초보자용 용어 설명\n• EC2: AWS에서 제공하는 클라우드 속 가상 컴퓨터입니다. 필요할 때 켜서 서버처럼 사용할 수 있습니다."}, {"id": "635", "tag": "[Security]", "question": "한 회사가 시스템을 AWS Cloud으로 이전했습니다. 시스템은 적절한 크기이며, 보안 검토에서도 문제는 발견되지 않았습니다. 회사는 추가적인 개발, 통합, 변경, 시스템 사용 증가가 이 최적화된 AWS 인프라를 위태롭게 하지 않도록 해야 합니다. 기업이 지속적인 최적화와 보안을 보고할 때 어떤 AWS 서비스를 사용해야 할까요?", "options": ["AWS Trusted Advisor", "AWS Health Dashboard", "아마존 커넥트", "AWS 시스템 매니저"], "correctLetters": ["A"], "correctTexts": ["AWS Trusted Advisor"], "explanation": "이 문제는 [Security] 영역 문제입니다.\n\n문제의 핵심은 문장에서 요구하는 조건에 가장 잘 맞는 서비스를 고르는 것입니다.\n\n보안 문제는 접근 통제, 로그 기록, 위협 탐지, 규정 준수 중 무엇을 묻는지 먼저 구분하면 쉽습니다.\n\n정답은 AWS Trusted Advisor입니다. 문제에서 요구한 조건과 가장 직접적으로 맞기 때문입니다."}, {"id": "636", "tag": "[Security]", "question": "어떤 AWS 서비스가 다른 AWS 서비스와 통합되어 데이터를 정지할 때 암호화할 수 있는 기능을 제공하나요?", "options": ["AWS 키 관리 서비스 (AWS KMS)", "AWS 인증서 관리자(ACM)", "AWS 신원 및 접근 관리 (IAM)", "AWS 보안 허브"], "correctLetters": ["A"], "correctTexts": ["AWS 키 관리 서비스 (AWS KMS)"], "explanation": "이 문제는 [Security] 영역 문제입니다.\n\n문제의 핵심은 문장에서 요구하는 조건에 가장 잘 맞는 서비스를 고르는 것입니다.\n\n보안 문제는 접근 통제, 로그 기록, 위협 탐지, 규정 준수 중 무엇을 묻는지 먼저 구분하면 쉽습니다.\n\n정답은 AWS 키 관리 서비스 (AWS KMS)입니다. 문제에서 요구한 조건과 가장 직접적으로 맞기 때문입니다.\n\n초보자용 용어 설명\n• IAM: 누가 무엇을 할 수 있는지 권한을 관리하는 서비스입니다. 회사의 출입 통제 시스템과 비슷합니다."}, {"id": "637", "tag": "[Billing]", "question": "회사는 특정 AWS 환경에서 모든 Amazon EC2 인스턴스의 월별 비용과 사용량을 추적하고자 합니다. 어떤 AWS 서비스나 도구가 이러한 요구사항을 충족할까요?", "options": ["AWS 비용 이상 탐지", "AWS 예산", "AWS 컴퓨트 옵티마이저", "AWS Trusted Advisor"], "correctLetters": ["B"], "correctTexts": ["AWS 예산"], "explanation": "이 문제는 [Billing] 영역 문제입니다.\n\n문제의 핵심은 문장에서 요구하는 조건에 가장 잘 맞는 서비스를 고르는 것입니다.\n\n비용 문제는 사용 기간, 중단 허용 여부, 그리고 사용량을 예측할 수 있는지를 먼저 보면 정답이 잘 보입니다.\n\n정답은 AWS 예산입니다. 문제에서 요구한 조건과 가장 직접적으로 맞기 때문입니다.\n\n초보자용 용어 설명\n• EC2: AWS에서 제공하는 클라우드 속 가상 컴퓨터입니다. 필요할 때 켜서 서버처럼 사용할 수 있습니다."}, {"id": "638", "tag": "[General]", "question": "기업은 필요에 따라 자원을 자동으로 획득하고, 더 이상 필요 없을 때 자원을 해제할 수 있는 능력을 원합니다. 이 기능을 설명하는 클라우드 개념은 무엇인가요?", "options": ["이용 가능성", "탄성", "내구성", "신뢰성"], "correctLetters": ["B"], "correctTexts": ["탄성"], "explanation": "이 문제는 [General] 영역 문제입니다.\n\n문제의 핵심은 문장에서 요구하는 조건에 가장 잘 맞는 서비스를 고르는 것입니다.\n\n정답은 탄성입니다. 문제에서 요구한 조건과 가장 직접적으로 맞기 때문입니다."}, {"id": "639", "tag": "[Billing]", "question": "기업은 단기간 동안 Amazon EC2 인스턴스에서 애플리케이션을 실행할 때 비용 효율적인 옵션을 원합니다. 애플리케이션은 중단될 수 있습니다. 어떤 EC2 인스턴스 유형이 이러한 요구사항을 충족하나요?", "options": ["Spot Instances", "On-Demand Instances", "Reserved Instances", "Dedicated Instances"], "correctLetters": ["A"], "correctTexts": ["Spot Instances"], "explanation": "이 문제는 [Billing] 영역 문제입니다.\n\n문제의 핵심은 문장에서 요구하는 조건에 가장 잘 맞는 서비스를 고르는 것입니다.\n\n비용 문제는 사용 기간, 중단 허용 여부, 그리고 사용량을 예측할 수 있는지를 먼저 보면 정답이 잘 보입니다.\n\n정답은 Spot Instances입니다. 문제에서 요구한 조건과 가장 직접적으로 맞기 때문입니다.\n\n초보자용 용어 설명\n• EC2: AWS에서 제공하는 클라우드 속 가상 컴퓨터입니다. 필요할 때 켜서 서버처럼 사용할 수 있습니다."}, {"id": "640", "tag": "[Security]", "question": "기업에는 AWS 비     let currentExam = [];
    let submitted = false;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function uniqueTags() {
      const tags = [...new Set(ALL_QUESTIONS.map(q => q.tag))].sort();
      const sel = document.getElementById('tagFilter');
      tags.forEach(tag => {
        const op = document.createElement('option');
        op.value = tag;
        op.textContent = tag;
        sel.appendChild(op);
      });
    }

    function filteredPool() {
      const tag = document.getElementById('tagFilter').value;
      return tag === 'ALL' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.tag === tag);
    }

    function buildExam() {
      submitted = false;
      document.getElementById('summaryBox').style.display = 'none';
      const pool = filteredPool();
      const reqCount = parseInt(document.getElementById('questionCount').value, 10);
      const count = Math.min(reqCount, pool.length);
      currentExam = shuffle(pool).slice(0, count);
      renderExam();
      updateStatus();
      window.scrollTo({top:0, behavior:'smooth'});
    }

    function updateStatus() {
      const pool = filteredPool();
      document.getElementById('poolInfo').textContent = `문제 풀 수: ${pool.length}`;
      document.getElementById('renderInfo').textContent = `현재 출제: ${currentExam.length}`;
      const answered = currentExam.filter((q, idx) => document.querySelector(`input[name="q_${idx}"]:checked`)).length;
      document.getElementById('answeredInfo').textContent = `응답 수: ${answered}`;
    }

    function renderExam() {
      const host = document.getElementById('examList');
      host.innerHTML = '';
      currentExam.forEach((q, idx) => {
        const card = document.createElement('section');
        card.className = 'question-card';
        const multi = q.correctLetters.length > 1;
        const help = multi ? '복수 정답 문제입니다. 해당되는 보기를 모두 선택하세요.' : '단일 정답 문제입니다. 가장 알맞은 보기 하나를 선택하세요.';
        card.innerHTML = `
          <div class="meta">
            <span class="qno">Question #${q.id}</span>
            <span class="tag">${q.tag}</span>
          </div>
          <div class="small">${help}</div>
          <div class="question-text">${escapeHtml(q.question)}</div>
          <div class="options" id="opts_${idx}"></div>
          <div class="result-box" id="result_${idx}"></div>
        `;
        host.appendChild(card);
        const opts = card.querySelector(`#opts_${idx}`);
        q.options.forEach((opt, oi) => {
          const letter = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'[oi];
          const type = multi ? 'checkbox' : 'radio';
          const row = document.createElement('label');
          row.className = 'option';
          row.innerHTML = `
            <input type="${type}" name="q_${idx}" value="${letter}" onchange="updateStatus()">
            <div><strong>${letter}.</strong> ${escapeHtml(opt)}</div>
          `;
          opts.appendChild(row);
        });
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function getSelectedLetters(idx) {
      return [...document.querySelectorAll(`input[name="q_${idx}"]:checked`)].map(el => el.value).sort();
    }

    function arraysEqual(a, b) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
      return true;
    }

    function submitExam() {
      if (!currentExam.length) return;
      submitted = true;
      let score = 0;
      let answered = 0;
      currentExam.forEach((q, idx) => {
        const selected = getSelectedLetters(idx);
        if (selected.length) answered += 1;
        const correct = [...q.correctLetters].sort();
        const isRight = arraysEqual(selected, correct);
        if (isRight) score += 1;

        const optionRows = [...document.querySelectorAll(`#opts_${idx} .option`)];
        optionRows.forEach((row, oi) => {
          const letter = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'[oi];
          row.classList.remove('correct','wrong');
          if (correct.includes(letter)) row.classList.add('correct');
          if (selected.includes(letter) && !correct.includes(letter)) row.classList.add('wrong');
        });

        const box = document.getElementById(`result_${idx}`);
        const selectedText = selected.length ? selected.join(', ') : '미응답';
        box.className = 'result-box show';
        box.innerHTML = `
          <div class="${isRight ? 'answer-line' : 'wrong-line'}">${isRight ? '정답입니다 ✅' : '오답입니다 ❌'} | 내 답: ${selectedText} | 정답: ${correct.join(', ')}</div>
          <div class="explain">${escapeHtml(q.explanation)}</div>
        `;
      });

      const total = currentExam.length;
      const percent = total ? Math.round((score / total) * 100) : 0;
      document.getElementById('summaryBox').style.display = 'block';
      document.getElementById('pdfArea').style.display = 'block';
      document.getElementById('scoreText').textContent = `${score} / ${total}`;
      document.getElementById('scoreDetail').textContent = `정답률 ${percent}% · 응답 ${answered} / ${total}`;
      document.getElementById('scoreBar').style.width = `${percent}%`;
      window.scrollTo({top:0, behavior:'smooth'});
    }

    document.getElementById('startBtn').addEventListener('click', buildExam);
    document.getElementById('shuffleBtn').addEventListener('click', buildExam);
    document.getElementById('submitBtn').addEventListener('click', submitExam);
    document.getElementById('tagFilter').addEventListener('change', buildExam);
    document.getElementById('questionCount').addEventListener('change', buildExam);

    uniqueTags();
    buildExam();

  doc.setFontSize(16);
  doc.text("AWS CLF 시험 결과 리포트", 10, y);
  y += 10;

  const scoreText = document.getElementById("scoreText").textContent;
  const scoreDetail = document.getElementById("scoreDetail").textContent;

  doc.setFontSize(12);
  doc.text(`점수: ${scoreText}`, 10, y);
  y += 6;
  doc.text(scoreDetail, 10, y);
  y += 10;

  const date = new Date().toLocaleString();
  doc.text(`날짜: ${date}`, 10, y);
  y += 10;

  currentExam.forEach((q, idx) => {
    const selected = getSelectedLetters(idx);
    const correct = q.correctLetters;
    const result = JSON.stringify(selected.sort()) === JSON.stringify(correct.sort());

    doc.setFontSize(11);
    doc.text(`Q${q.id} ${q.tag}`, 10, y);
    y += 6;

    doc.text(`내 답: ${selected.join(", ") || "미응답"}`, 12, y);
    y += 6;

    doc.text(`정답: ${correct.join(", ")}`, 12, y);
    y += 6;

    doc.text(result ? "결과: 정답" : "결과: 오답", 12, y);
    y += 10;

    if (y > 270) {
      doc.addPage();
      y = 20;
    }
  });

  doc.save("AWS_시험결과.pdf");
}
